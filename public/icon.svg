<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" filter="url(#shadow)" />
  
  <!-- Science Symbol (Atom-like) -->
  <g transform="translate(256, 256) scale(0.8)">
    <ellipse cx="0" cy="0" rx="180" ry="60" fill="none" stroke="white" stroke-width="12" opacity="0.6" transform="rotate(0)" />
    <ellipse cx="0" cy="0" rx="180" ry="60" fill="none" stroke="white" stroke-width="12" opacity="0.6" transform="rotate(60)" />
    <ellipse cx="0" cy="0" rx="180" ry="60" fill="none" stroke="white" stroke-width="12" opacity="0.6" transform="rotate(120)" />
    
    <!-- Central Nucleus / Data Node -->
    <circle cx="0" cy="0" r="45" fill="white" />
    
    <!-- Electrons / Data Points -->
    <circle cx="180" cy="0" r="15" fill="white" transform="rotate(0)" />
    <circle cx="180" cy="0" r="15" fill="white" transform="rotate(60)" />
    <circle cx="180" cy="0" r="15" fill="white" transform="rotate(120)" />
    <circle cx="180" cy="0" r="15" fill="white" transform="rotate(180)" />
    <circle cx="180" cy="0" r="15" fill="white" transform="rotate(240)" />
    <circle cx="180" cy="0" r="15" fill="white" transform="rotate(300)" />
  </g>
  
  <!-- Subtle Glow -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="white" stroke-width="2" opacity="0.2" />
</svg>
